name: Checkout repository
description: Checkout the repository with optional minimal fetch depth

inputs:
  fetch-depth:
    description: Number of commits to fetch (0 for full history, 1 for minimal)
    required: false
    default: '0'

runs:
  using: composite
  steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: ${{ inputs.fetch-depth }}

