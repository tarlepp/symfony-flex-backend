version: 2
_commit_message_template: &commit_message_template
    prefix: "Chore(deps)"
_schedule_weekly: &schedule_weekly
    interval: weekly
_labels_tools: &labels_tools
    - dependencies
    - composer
    - tools
_rebase_auto: &rebase_auto
    rebase-strategy: auto
updates:
    -   package-ecosystem: "github-actions"
        directory: "/"
        schedule: *schedule_weekly
        open-pull-requests-limit: 5
        <<: *rebase_auto
        commit-message: *commit_message_template
        labels:
            - dependencies
            - github-actions
        groups:
            github_actions_dependencies:
                patterns:
                    - "*"
    -   package-ecosystem: composer
        directory: "/"
        schedule: *schedule_weekly
        open-pull-requests-limit: 10
        <<: *rebase_auto
        commit-message: *commit_message_template
        labels:
            - dependencies
            - composer
        groups:
            symfony_dependencies:
                patterns:
                    - "symfony/*"
            dependencies:
                patterns:
                    - "*"
                exclude-patterns:
                    - "symfony/*"
    -   package-ecosystem: docker
        directory: "/"
        schedule: *schedule_weekly
        open-pull-requests-limit: 5
        <<: *rebase_auto
        commit-message: *commit_message_template
        labels:
            - dependencies
            - docker
        groups:
            docker_dependencies:
                patterns:
                    - "*"
    -   package-ecosystem: composer
        directory: "/tools/02_phpstan"
        schedule: *schedule_weekly
        open-pull-requests-limit: 3
        <<: *rebase_auto
        commit-message: *commit_message_template
        labels: *labels_tools
        groups:
            tools_phpstan_dependencies:
