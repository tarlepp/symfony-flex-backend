# GitHub Actions docs
# https://help.github.com/en/articles/about-github-actions
# https://help.github.com/en/articles/workflow-syntax-for-github-actions
name: CI
on:
  # Trigger the workflow on push or pull request,
  # but only for the master branch
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  security-check:
    name: PHP Security Checker
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
    steps:
      - &checkout_step
        name: Make checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: '0'

      - name: Bootstrap PHP project
        uses: ./.github/actions/php-bootstrap

      - name: PHP Security Checker
        uses: symfonycorp/security-checker-action@258311ef7ac571f1310780ef3d79fc5abef642b5 # v5

      - name: Check that application doesn't have installed dependencies with known security vulnerabilities
        run: make check-security

  lint-configuration:
    name: Lint configuration
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
    steps:
      - *checkout_step

      - name: Bootstrap PHP project
        uses: ./.github/actions/php-bootstrap

      - name: Display Symfony application information
        run: |
          php ./bin/console about

      - name: Validate main `composer.json` and `composer.lock` files
        run: composer validate --no-check-version

      - name: Check that environment is configured correctly
        run: php ./vendor/bin/requirements-checker

      - name: Lint YAML configurations
        run: make lint-yaml

  static:
    name: Static analyzers (${{ matrix.analyzer.name }})
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    needs:
      - security-check
      - lint-configuration
    strategy:
      fail-fast: false
      matrix:
        analyzer:
          - name: PHP CodeSniffer
            command: make phpcs
          - name: ECS
            command: make ecs
          - name: PHPLint
            command: make phplint
          - name: PHP Parallel Lint
            command: make php-parallel-lint
          - name: Psalm
            command: make psalm-github
          - name: PHPStan
            command: make phpstan-github
          - name: PHPLoc
            command: make phploc
          - name: PHP Insights
            command: make phpinsights
    steps:
      - *checkout_step

      - name: Bootstrap PHP project
        uses: ./.github/actions/php-bootstrap
        with:
          setup-ini-values: opcache.jit=disable

      - name: Run static analyzer (${{ matrix.analyzer.name }})
        run: ${{ matrix.analyzer.command }}

      - name: Archive Psalm results (psalm.json)
        if: matrix.analyzer.name == 'Psalm'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: psalm.json
          path: ./build/psalm.json

      - name: Archive `phploc` results (phploc.json)
        if: matrix.analyzer.name == 'PHPLoc'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: phploc.json
          path: ./build/phploc.json

  gitleaks:
    name: Gitleaks scan
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - *checkout_step

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  static-summary:
    name: Static analyzers
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs:
      - static
      - gitleaks
    if: ${{ always() }}
    steps:
      - name: Validate static analyzer matrix result
        run: |
          echo "Static matrix result: ${{ needs.static.result }}"
          echo "Gitleaks result: ${{ needs.gitleaks.result }}"
          test "${{ needs.static.result }}" = "success"
          test "${{ needs.gitleaks.result }}" = "success"

  test:
    name: PHPUnit tests
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    needs:
      - static-summary
      - lint-documentation
    env:
      SCRUTINIZER_ACCESS_TOKEN: ${{ secrets.SCRUTINIZER_ACCESS_TOKEN }}
      COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    services:
      mariadb:
        image: mariadb:10.7.1
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: false
          MYSQL_ROOT_PASSWORD: symfony
          MYSQL_DATABASE: symfony
        ports:
          - 3306/tcp
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    strategy:
      fail-fast: false
    steps:
      - *checkout_step

      - name: Bootstrap PHP project
        uses: ./.github/actions/php-bootstrap
        with:
          setup-extensions: pdo_mysql, mysql
          setup-coverage: xdebug
          install-dependencies: 'false'
          print-versions: 'false'

      - name: Configure application for CI run
        run: |
          cp .env.gh-actions .env
          cp .env.gh-actions .env.test
          make generate-jwt-keys
          chmod 644 ./config/jwt/private.pem

      - name: Install Composer dependencies
        run: composer install --no-progress --optimize-autoloader

      - name: Check which versions we're using
        run: |
          mysql --version
          php --version
          php ./bin/console --version
          php ./vendor/bin/phpunit --version
          composer --version

      #- name: Prepare Code Climate (https://codeclimate.com/github/tarlepp/symfony-flex-backend/)
      #  run: |
      #    curl -L https://codeclimate.com/downloads/test-reporter/test-reporter-latest-linux-amd64 > ./cc-test-reporter
      #    chmod +x ./cc-test-reporter
      #    GIT_BRANCH=$GITHUB_REF GIT_COMMIT_SHA=$GITHUB_SHA ./cc-test-reporter before-build
      #  env:
      #    CC_TEST_REPORTER_ID: ${{ secrets.CC_TEST_REPORTER_ID }} # https://docs.codeclimate.com/docs/finding-your-test-coverage-token

      - name: Run application test suites with PHPUnit
        run: make run-tests-php
        env:
          DATABASE_URL: mysql://root:symfony@127.0.0.1:${{ job.services.mariadb.ports['3306'] }}/symfony

      - name: Show external reporting eligibility (safe debug)
        run: |
          echo "External reporting summary (no secrets shown):"
          echo "- Event allows uploads: ${{ github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork }}"
          echo "- Scrutinizer upload enabled: ${{ env.SCRUTINIZER_ACCESS_TOKEN != '' && (github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork) }}"
          echo "- Coveralls upload enabled: ${{ env.COVERALLS_REPO_TOKEN != '' && (github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork) }}"
          echo "- Sonar upload enabled: ${{ env.SONAR_TOKEN != '' && (github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork) }}"

      #- name: Report results to Code Climate (https://codeclimate.com/github/tarlepp/symfony-flex-backend/)
      #  run: GIT_BRANCH=$GITHUB_REF GIT_COMMIT_SHA=$GITHUB_SHA ./cc-test-reporter after-build --id ${{ secrets.CC_TEST_REPORTER_ID }} --coverage-input-type clover --exit-code $?
      #  env:
      #    CC_TEST_REPORTER_ID: ${{ secrets.CC_TEST_REPORTER_ID }} # https://docs.codeclimate.com/docs/finding-your-test-coverage-token

      - name: Report results to Scrutinizer (https://scrutinizer-ci.com/g/tarlepp/symfony-flex-backend/)
        if: ${{ env.SCRUTINIZER_ACCESS_TOKEN != '' && (github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork) }}
        run: |
          composer global require scrutinizer/ocular
          "$(composer global config bin-dir --absolute)/ocular" code-coverage:upload --access-token ${{ env.SCRUTINIZER_ACCESS_TOKEN }} --format=php-clover ./build/logs/clover.xml

      - name: Report results to Coveralls (https://coveralls.io/github/tarlepp/symfony-flex-backend)
        if: ${{ env.COVERALLS_REPO_TOKEN != '' && (github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork) }}
        run: php ./vendor/bin/php-coveralls -v
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COVERALLS_REPO_TOKEN: ${{ env.COVERALLS_REPO_TOKEN }}
          COVERALLS_RUN_LOCALLY: 1

      - name: SonarQube Scan (https://sonarcloud.io/dashboard?id=github.com.tarlepp.symfony-flex-backend)
        if: ${{ env.SONAR_TOKEN != '' && (github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork) }}
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }} # https://github.com/SonarSource/sonarqube-scan-action?tab=readme-ov-file#environment-variables

      - name: Create PhpMetrics report
        run: make phpmetrics

      - name: Archive code coverage results (clover.xml)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: clover.xml
          path: ./build/logs/clover.xml

      - name: Archive code coverage results (junit.xml)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: junit.xml
          path: ./build/logs/junit.xml

      - name: Archive Code Coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: CodeCoverage
          path: ./build/report

      - name: Archive PhpMetrics results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: PhpMetrics
          path: ./build/phpmetrics

  lint-documentation:
    name: Lint documentation files
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - *checkout_step

      - name: Lint all markdown documentation files
        uses: DavidAnson/markdownlint-cli2-action@fa0cd0f1a052f54da593c83860f2292982f5d142 # v23.2.0
        with:
          globs: |
            README.md
            .devcontainer/*.md
            doc/*.md
            docker/*.md
            secrets/*.md

  build:
    name: Build application Docker image
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    needs:
      - static-summary
      - lint-documentation

    steps:
      - *checkout_step

      - name: Set tag var
        id: vars
        run: echo "DOCKER_TAG=$(echo '${{ github.ref_name }}' | sed -E 's#[/().]+#_#g')-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build the Docker image
        run: docker build . --file Dockerfile --tag symfony-flex-backend:${{ steps.vars.outputs.DOCKER_TAG }}

      - name: Scan Docker image with Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: 'symfony-flex-backend:${{ steps.vars.outputs.DOCKER_TAG }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
